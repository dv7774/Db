## How to deploy this

1. Go to `github.com/dv7774/Db`
2. Navigate to `.github/workflows/main.yml`
3. Click the pencil ✏️ edit icon
4. Select all and paste the contents of this file
5. Commit directly to `main`

Then verify your secrets are set at `Db → Settings → Secrets and variables → Actions`:
- `ETHERSCAN_API_KEY` → your new regenerated key from Etherscan
- `XYO_WALLET_ADDRESS` → your XYO wallet address

Once committed, the next workflow run should go green for the first time.